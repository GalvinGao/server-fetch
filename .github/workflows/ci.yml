name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        # Reads version from packageManager field in package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: oxlint
        run: pnpm lint

      - name: oxfmt check
        run: pnpm fmt:check

      - name: tests
        run: pnpm vitest run --coverage 2>&1 | tee test-output.txt

      - name: coverage summary
        if: always()
        run: |
          {
            echo '### Coverage'
            echo ''
            echo '```'
            sed -n '/% Coverage report/,/===$/p' test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
