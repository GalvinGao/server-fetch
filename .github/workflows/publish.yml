name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC trusted publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: oxlint
        run: pnpm lint

      - name: oxfmt check
        run: pnpm fmt:check

      - name: tests
        run: pnpm test

      - name: build
        run: pnpm build

      - name: publish
        # setup-node sets NODE_AUTH_TOKEN to GITHUB_TOKEN automatically.
        # Unset it so npm falls back to OIDC trusted publisher authentication.
        # Keep the .npmrc (it contains the registry URL npm needs for OIDC).
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --access public --provenance
