name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for OIDC trusted publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          # Node 25 ships npm >= 11.x which supports OIDC trusted publishing
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: oxlint
        run: pnpm lint

      - name: oxfmt check
        run: pnpm fmt:check

      - name: tests
        run: pnpm test

      - name: build
        run: pnpm build

      - name: publish
        # pnpm publish does not support OIDC trusted publishing yet (pnpm/pnpm#9812)
        # Use npm publish directly instead
        run: npm publish --provenance --access public
